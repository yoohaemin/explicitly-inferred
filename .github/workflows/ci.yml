name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test-current-jdks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ matrix.java }}
    - run: chmod +x ./mill
    - run: ./mill --no-server 'plugin[3.8.2].test.testCached'

  test-supported-scala:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scala:
        - 3.5.0
        - 3.5.1
        - 3.5.2
        - 3.6.0
        - 3.6.1
        - 3.6.2
        - 3.6.3
        - 3.6.4
        - 3.7.0
        - 3.7.1
        - 3.7.2
        - 3.7.3
        - 3.7.4
        - 3.8.0
        - 3.8.1
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21
    - run: chmod +x ./mill
    - run: ./mill --no-server "plugin[${{ matrix.scala }}].test.testCached"

  publish-local:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21
    - run: chmod +x ./mill
    - run: ./mill --no-server 'plugin[__].publishLocal'
